<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240">
  <defs>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="240" fill="#B8E8B0"/>

  <!-- Mini platform icon -->
  <g transform="translate(48, 48)">
    <rect width="144" height="144" rx="10" fill="#3A3A3A"/>
    <rect x="12" y="12" width="120" height="120" rx="4" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    <rect x="12" y="12" width="120" height="120" rx="4" fill="none" stroke="#5CE1FF" stroke-width="1.5"/>
    <text x="72" y="88" text-anchor="middle"
          font-family="Segoe Script, cursive" font-size="52" fill="#5CE1FF" filter="url(#neonGlow)">34</text>
  </g>

  <!-- Wordmark -->
  <text x="240" y="108" font-family="Segoe UI, system-ui, sans-serif" font-size="56" font-weight="600" fill="#2A2A2A">Rule</text>
  <text x="360" y="108" font-family="Segoe Script, cursive" font-size="64" fill="#5CE1FF" filter="url(#neonGlow)">34</text>
  <text x="240" y="158" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="400" fill="#4A4A4A" letter-spacing="4">Gallery</text>
</svg>
