<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Site mint green -->
  <rect width="512" height="512" rx="96" fill="#B8E8B0"/>

  <!-- Abstract green hair swoosh (mascot nod, no figure) -->
  <path d="M 180 108 Q 256 72 332 108 Q 300 140 256 148 Q 212 140 180 108 Z" fill="#6BCB5C" opacity="0.85"/>

  <!-- Dark platform -->
  <rect x="96" y="168" width="320" height="220" rx="12" fill="#3A3A3A"/>

  <!-- Glowing frame border -->
  <rect x="112" y="184" width="288" height="188" rx="6" fill="none" stroke="#FFFFFF" stroke-width="4" filter="url(#glow)"/>
  <rect x="112" y="184" width="288" height="188" rx="6" fill="none" stroke="#5CE1FF" stroke-width="2" opacity="0.9"/>

  <!-- Neon "34" -->
  <text x="256" y="310" text-anchor="middle"
        font-family="Segoe Script, Brush Script MT, cursive"
        font-size="120" font-weight="400"
        fill="#5CE1FF" filter="url(#softGlow)">34</text>
</svg>
